name = "mouse-oj"
main = "src/index.js"
compatibility_date = "2026-06-16"

[assets]
directory = "./frontend/dist"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "mouse-oj-db"
database_id = "b9129b22-f602-43d3-8bf4-e740d7affddb"

[vars]
JWT_SECRET = "改成一个足够长的随机字符串"
# Vjudge Cookie 用 secret 注入，不写在这里：
#   npx wrangler secret put VJUDGE_COOKIE

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
